<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediaVault | Private Repository</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; }
        .glass-card { background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(59, 130, 246, 0.05); transition: 0.3s; }
        .bg-grid { background-image: radial-gradient(circle at 2px 2px, rgba(59, 130, 246, 0.03) 1px, transparent 0); background-size: 40px 40px; }
        .modal-active { transform: scale(1) !important; opacity: 1 !important; }
    </style>
</head>
<body class="bg-grid text-slate-200 min-h-screen pb-20">

<nav class="border-b border-white/5 bg-slate-950/50 sticky top-0 z-50 backdrop-blur-md px-6 py-4 flex justify-between items-center">
    <h1 class="text-2xl font-bold text-white">Media<span class="text-blue-500">Vault</span></h1>
    <div class="text-[10px] font-bold text-blue-400 bg-blue-500/10 px-3 py-1 rounded-full uppercase tracking-widest border border-blue-500/20">March 2026 Archive</div>
</nav>

<header class="max-w-7xl mx-auto px-6 pt-16 pb-12 text-center">
    <h2 class="text-5xl font-extrabold text-white mb-6">The Golden Age <br><span class="text-blue-500">In Your Pocket.</span></h2>
    <p class="text-slate-400 text-lg mb-10">Select a title to view details and start downloading.</p>
    <a href="https://www.effectivegatecpm.com/nu5nxhvxu?key=3c2836e0c24cca58b18b7f39e72f03c6" target="_blank" class="px-8 py-4 bg-blue-600 hover:bg-blue-500 text-white font-black rounded-2xl transition-all shadow-xl shadow-blue-600/30">🚀 SUPPORT THE VAULT (FREE)</a>
</header>

<main id="vaultGrid" class="max-w-7xl mx-auto px-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></main>

<div id="gameOverlay" class="fixed inset-0 z-[100] hidden items-center justify-center p-4">
    <div class="absolute inset-0 bg-black/80 backdrop-blur-xl" onclick="closeOverlay()"></div>
    <div id="modalBox" class="relative w-full max-w-lg bg-[#0d1117] border border-white/10 rounded-[2.5rem] overflow-hidden shadow-2xl scale-90 opacity-0 transition-all duration-300">
        <img id="overlayImg" src="" class="w-full h-56 object-cover">
        <div class="p-8">
            <h2 id="overlayTitle" class="text-3xl font-black italic uppercase text-white mb-2"></h2>
            <div class="flex gap-2 mb-4">
                <span id="overlaySize" class="bg-blue-600/20 text-blue-400 text-[10px] font-bold px-3 py-1 rounded-full border border-blue-500/30"></span>
                <span id="overlayTag" class="bg-white/5 text-gray-400 text-[10px] px-3 py-1 rounded-full"></span>
            </div>
            <p id="overlayDesc" class="text-slate-400 text-sm mb-8 leading-relaxed"></p>
            <div class="flex flex-col gap-3">
                <a id="overlayDl" href="#" target="_blank" class="w-full py-4 bg-blue-600 hover:bg-blue-500 text-white text-center font-black uppercase rounded-2xl shadow-lg">Download File</a>
                <button onclick="closeOverlay()" class="text-slate-500 hover:text-white text-xs font-bold">CLOSE VAULT</button>
            </div>
        </div>
    </div>
</div>

<script>
    async function loadVault() {
        const res = await fetch('./vault-data.json?t=' + Date.now());
        const games = await res.json();
        const grid = document.getElementById('vaultGrid');
        
        grid.innerHTML = games.map(game => `
            <div class="group glass-card rounded-[2rem] overflow-hidden cursor-pointer hover:border-blue-500/50 hover:-translate-y-2" 
                 onclick="openOverlay('${game.title.replace(/'/g, "\\'")}', '${game.cover}', '${game.size}', '${game.tag}', '${game.desc.replace(/'/g, "\\'")}', '${game.url || game.driveId}')">
                <img src="${game.cover || 'https://via.placeholder.com/460x215'}" class="w-full h-48 object-cover opacity-80 group-hover:opacity-100 transition-all duration-500">
                <div class="p-6">
                    <h3 class="text-xl font-bold text-white group-hover:text-blue-400">${game.title}</h3>
                    <p class="text-slate-500 text-[10px] font-bold mt-1 uppercase tracking-widest">${game.tag} • ${game.size}</p>
                </div>
            </div>`).join('');
    }

    function openOverlay(title, img, size, tag, desc, link) {
        document.getElementById('overlayTitle').innerText = title;
        document.getElementById('overlayImg').src = img;
        document.getElementById('overlaySize').innerText = size;
        document.getElementById('overlayTag').innerText = tag;
        document.getElementById('overlayDesc').innerText = desc;
        document.getElementById('overlayDl').href = link.startsWith('http') ? link : `https://drive.google.com/uc?export=download&id=${link}`;
        
        document.getElementById('gameOverlay').classList.replace('hidden', 'flex');
        setTimeout(() => document.getElementById('modalBox').classList.add('modal-active'), 10);
    }

    function closeOverlay() {
        document.getElementById('modalBox').classList.remove('modal-active');
        setTimeout(() => document.getElementById('gameOverlay').classList.replace('flex', 'hidden'), 300);
    }

    loadVault();
</script>
</body>
</html>

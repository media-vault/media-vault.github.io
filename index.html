    <style>

        }
        .discord-btn:hover { 
            background: #5865F2; 
            color: white; 
            box-shadow: 0 4px 15px rgba(88, 101, 242, 0.4);
        }

</head>

            <a href="https://discord.gg/wRMFJXxG6e" target="_blank" class="discord-btn px-5 py-2 rounded-xl text-[10px] font-bold uppercase tracking-widest flex items-center gap-2 transition-all hover:-translate-y-0.5">
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"></path></svg>

<header class="max-w-7xl mx-auto px-6 pt-16 pb-12 text-center">
    <h2 class="text-5xl md:text-6xl font-extrabold text-white mb-6 tracking-tight">The Golden Age <br><span class="text-blue-500">In Your Pocket.</span></h2>
    <p class="text-slate-400 max-w-2xl mx-auto text-lg">Your private vault of high-performance archives.</p>
</header>

<div class="max-w-md mx-auto mb-8 p-6 glass-card rounded-3xl text-center">
    <p class="text-[10px] font-bold text-blue-400 uppercase tracking-widest mb-3">Goal: High-Speed NAS Fund</p>
    <div class="w-full bg-slate-800 rounded-full h-2.5 mb-2 overflow-hidden">
        <div class="bg-emerald-500 h-full shadow-[0_0_15px_rgba(16,185,129,0.5)]" style="width: 2%"></div>
    </div>
    <div class="flex justify-between items-center px-1 text-[10px] font-medium uppercase">
        <span class="text-slate-500 italic">Current: $0.016</span>
        <span class="text-emerald-500 tracking-tighter">Phase 1 Active</span>
    </div>
</div>

<div class="text-center mb-16 px-6">
    <a href="https://www.effectivegatecpm.com/nu5nxhvxu?key=3c2836e0c24cca58b18b7f39e72f03c6" target="_blank" class="inline-block w-full max-w-xs px-8 py-4 bg-blue-600 hover:bg-blue-500 text-white font-extrabold rounded-2xl transition-all transform hover:scale-105 shadow-xl shadow-blue-600/30">
        🚀 SUPPORT THE VAULT (FREE)
    </a>
</div>

<div class="max-w-7xl mx-auto px-6 mb-12">
    <div class="flex flex-col md:flex-row gap-4 justify-between items-center bg-slate-900/40 p-2 rounded-2xl border border-white/5">
        <input type="text" id="searchInput" onkeyup="searchVault()" placeholder="Search vault titles..." class="bg-transparent w-full px-6 py-3 outline-none text-white font-medium">
        <div class="relative w-full md:w-64">
            <button onclick="toggleFilterMenu()" id="filterBtnLabel" class="w-full bg-blue-600 hover:bg-blue-500 text-white px-6 py-3 rounded-xl font-bold text-sm flex justify-between items-center transition-all">
                <span>All Platforms</span>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7" /></svg>
            </button>
            <div id="filterMenu" class="hidden absolute top-full left-0 right-0 mt-2 bg-slate-900 border border-white/10 rounded-2xl shadow-2xl z-50 overflow-hidden">
                <div class="p-1">
                    <button onclick="filterType('all', 'All Platforms')" class="w-full text-left px-4 py-3 hover:bg-blue-600/20 rounded-xl text-xs font-semibold text-slate-300">All Platforms</button>
                    <button onclick="filterType('pc', 'PC Games')" class="w-full text-left px-4 py-3 hover:bg-blue-600/20 rounded-xl text-xs font-semibold text-slate-300">PC Games</button>
                    <button onclick="filterType('quest', 'Meta Quest')" class="w-full text-left px-4 py-3 hover:bg-blue-600/20 rounded-xl text-xs font-semibold text-slate-300">Meta Quest</button>
                    <button onclick="filterType('psp', 'PSP')" class="w-full text-left px-4 py-3 hover:bg-blue-600/20 rounded-xl text-xs font-semibold text-slate-300">PSP</button>
                    <button onclick="filterType('other', 'Other')" class="w-full text-left px-4 py-3 hover:bg-blue-600/20 rounded-xl text-xs font-semibold text-slate-300">Other</button>
                </div>
            </div>
        </div>
    </div>
</div>

<main id="vaultGrid" class="max-w-7xl mx-auto px-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
    </main>

<footer class="max-w-7xl mx-auto px-6 mt-32 py-12 border-t border-white/5 text-center">
    <p class="text-slate-500 text-[10px] uppercase tracking-[0.2em] font-bold">MediaVault Archive © 2026</p>
</footer>

<script>
    // 1. SMART LOADER: Syncs with your GitHub JSON
    async function loadVault() {
        try {
            // Fetch with cache-buster to always get newest JSON
            const response = await fetch('./vault-data.json?t=' + Date.now());
            const games = await response.json();
            const grid = document.getElementById('vaultGrid');
            
            grid.innerHTML = games.map(game => {
                // Logic: Use full URL if provided, otherwise build Google link from driveId
                const dLink = game.url && game.url.startsWith('http') 
                    ? game.url 
                    : `https://drive.google.com/uc?export=download&id=${game.driveId}`;

                return `
                <div class="file-item glass-card p-6 rounded-3xl flex flex-col justify-between" data-type="${game.type || 'other'}">
                    <div>
                        <div class="flex justify-between items-center mb-4">
                            <span class="px-3 py-1 bg-${game.tagColor || 'blue'}-500/10 text-${game.tagColor || 'blue'}-400 text-[10px] font-bold uppercase rounded-full border border-${game.tagColor || 'blue'}-500/20">
                                ${game.tag || 'Vault'}
                            </span>
                            <span class="text-slate-500 text-[10px] font-mono">${game.size || '???'}</span>
                        </div>
                        <h3 class="game-title text-xl font-bold mb-2 text-white">${game.title}</h3>
                        <p class="text-slate-400 text-sm leading-relaxed mb-6">${game.desc || 'Secure archive item.'}</p>
                    </div>
                    <div class="space-y-3">
                        <a href="${dLink}" target="_blank" class="block w-full bg-blue-600 hover:bg-blue-500 text-white text-center py-3 rounded-2xl font-bold transition-all text-sm shadow-lg shadow-blue-600/20">
                            Download
                        </a>
                        <a href="https://www.effectivegatecpm.com/nu5nxhvxu?key=3c2836e0c24cca58b18b7f39e72f03c6" target="_blank" class="block w-full border border-blue-500/10 hover:bg-white/5 text-slate-500 text-center py-3 rounded-2xl font-bold transition-all text-[9px] uppercase tracking-wider">
                            ⚡ Support the Archive
                        </a>
                    </div>
                </div>`;
            }).join('');
        } catch (e) {
            console.error("Sync failed:", e);
        }
    }

    // 2. SEARCH & FILTER LOGIC
    function toggleFilterMenu() { document.getElementById('filterMenu').classList.toggle('hidden'); }
    
    function filterType(type, label) {
        document.querySelector('#filterBtnLabel span').innerText = label;
        document.getElementById('filterMenu').classList.add('hidden');
        const cards = document.querySelectorAll('.file-item');
        cards.forEach(card => card.style.display = (type === 'all' || card.getAttribute('data-type') === type) ? 'flex' : 'none');
    }

    function searchVault() {
        const input = document.getElementById('searchInput').value.toLowerCase();
        const cards = document.querySelectorAll('.file-item');
        cards.forEach(card => {
            const title = card.querySelector('.game-title').innerText.toLowerCase();
            card.style.display = title.includes(input) ? 'flex' : 'none';
        });
    }

    // Initial load
    loadVault();

    // Close filter menu when clicking outside
    window.onclick = function(event) {
        if (!event.target.closest('#filterBtnLabel') && !event.target.closest('#filterMenu')) {
            document.getElementById('filterMenu').classList.add('hidden');
        }
    }
</script>
</body>
</html>

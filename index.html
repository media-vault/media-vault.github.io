<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediaVault | Private Repository</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; transition: direction 0.3s ease; }
        .glass-card { background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(59, 130, 246, 0.05); transition: 0.3s; }
        .bg-grid { background-image: radial-gradient(circle at 2px 2px, rgba(59, 130, 246, 0.03) 1px, transparent 0); background-size: 40px 40px; }
        .modal-active { transform: scale(1) !important; opacity: 1 !important; }
        body[dir="rtl"] .text-left { text-align: right; }
        body[dir="rtl"] #searchInput { text-align: right; }
    </style>
</head>
<body class="bg-grid text-slate-200 min-h-screen pb-20">

<nav class="border-b border-white/5 bg-slate-950/50 sticky top-0 z-50 backdrop-blur-md px-6 py-4 flex justify-between items-center">
    <h1 class="text-2xl font-bold text-white">Media<span class="text-blue-500">Vault</span></h1>
    <div class="flex items-center gap-4">
        <select id="langSelect" onchange="changeLanguage()" class="bg-white/5 text-slate-300 text-[10px] font-bold px-2 py-1 rounded border border-white/10 outline-none cursor-pointer hover:bg-white/10">
            <option value="en">EN</option>
            <option value="es">ES</option>
            <option value="ar">AR</option>
        </select>
        <a href="https://discord.gg/wRMFJXxG6e" target="_blank" title="Join Discord" class="text-slate-400 hover:text-[#5865F2] transition-all duration-300">
            <svg class="w-6 h-6 fill-current" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42.001 1.333-.946 2.418-2.157 2.418z"/>
            </svg>
        </a>
    </div>
</nav>

<header class="max-w-7xl mx-auto px-6 pt-16 pb-12 text-center">
    <h2 id="mainTitle" class="text-5xl font-extrabold text-white mb-6">The Golden Age <br><span class="text-blue-500">In Your Pocket.</span></h2>
    <p id="subHeader" class="text-slate-400 text-lg mb-10">Select a title to view details and start downloading.</p>
    <a id="mainAdBtn" href="https://www.effectivegatecpm.com/nu5nxhvxu?key=3c2836e0c24cca58b18b7f39e72f03c6" target="_blank" class="px-8 py-4 bg-blue-600 hover:bg-blue-500 text-white font-black rounded-2xl transition-all shadow-xl shadow-blue-600/30">🚀 SUPPORT THE VAULT (FREE)</a>
</header>

<div class="max-w-4xl mx-auto mb-10 px-6 text-center">
    <div class="glass-card p-4 rounded-[2rem] border border-blue-500/10 inline-block w-full">
        <p id="adLabel" class="text-[9px] font-bold text-slate-500 uppercase tracking-[0.3em] mb-4">Sponsored Content</p>
        <script async="async" data-cfasync="false" src="https://pl28824399.effectivegatecpm.com/e17568324405fdb49ee507df497c76c3/invoke.js"></script>
        <div id="container-e17568324405fdb49ee507df497c76c3"></div>
    </div>
</div>

<div class="max-w-7xl mx-auto px-6 mb-12">
    <div class="flex flex-col md:flex-row gap-4 justify-between items-center bg-slate-900/40 p-2 rounded-2xl border border-white/5">
        <input type="text" id="searchInput" onkeyup="searchVault()" placeholder="Search vault titles..." class="bg-transparent w-full px-6 py-3 outline-none text-white font-medium">
        <select id="typeFilter" onchange="searchVault()" class="bg-slate-800 text-white px-6 py-3 rounded-xl font-bold text-sm outline-none border border-white/10">
            <option value="all">All Platforms</option>
            <option value="pc">PC Games</option>
            <option value="quest">Meta Quest</option>
            <option value="psp">PSP</option>
            <option value="ps1">PS1</option>
        </select>
    </div>
</div>

<main id="vaultGrid" class="max-w-7xl mx-auto px-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></main>

<div id="gameOverlay" class="fixed inset-0 z-[100] hidden items-center justify-center p-4">
    <div class="absolute inset-0 bg-black/80 backdrop-blur-xl" onclick="closeOverlay()"></div>
    <div id="modalBox" class="relative w-full max-w-lg bg-[#0d1117] border border-white/10 rounded-[2.5rem] overflow-hidden shadow-2xl scale-90 opacity-0 transition-all duration-300">
        <img id="overlayImg" src="" class="w-full h-56 object-cover">
        <div class="p-8">
            <h2 id="overlayTitle" class="text-3xl font-black italic uppercase text-white mb-2"></h2>
            <div class="flex gap-2 mb-4">
                <span id="overlaySize" class="bg-blue-600/20 text-blue-400 text-[10px] font-bold px-3 py-1 rounded-full border border-blue-500/30"></span>
                <span id="overlayTag" class="bg-white/5 text-gray-400 text-[10px] px-3 py-1 rounded-full border border-white/10"></span>
            </div>
            <p id="overlayDesc" class="text-slate-400 text-sm mb-8 leading-relaxed"></p>
            <div class="flex flex-col gap-3">
                <a id="overlayDl" href="#" target="_blank" class="w-full py-4 bg-blue-600 hover:bg-blue-500 text-white text-center font-black uppercase rounded-2xl shadow-lg">Download File</a>
                <button id="shareBtn" onclick="copyGameLink()" class="w-full py-3 bg-white/5 hover:bg-white/10 text-white text-center font-bold uppercase rounded-xl border border-white/10 transition-all flex items-center justify-center gap-2">
                    <span id="shareText">Share Link</span>
                </button>
                <button id="closeBtn" onclick="closeOverlay()" class="text-slate-500 hover:text-white text-xs font-bold uppercase tracking-widest mt-2">Back to Vault</button>
            </div>
        </div>
    </div>
</div>

<footer class="max-w-7xl mx-auto px-6 mt-32 py-12 border-t border-white/5 text-center">
    <p class="text-slate-500 text-[10px] uppercase tracking-[0.2em] font-bold">MediaVault Archive © 2026</p>
</footer>

<script>
    let allGames = [];
    let currentOpenGame = null; // Track currently open game for re-translation
    
    const i18n = {
        en: { 
            title: 'The Golden Age <br><span class="text-blue-500">In Your Pocket.</span>',
            search: "Search vault titles...", all: "All Platforms", support: "🚀 SUPPORT THE VAULT (FREE)", 
            download: "Download File", close: "Back to Vault", ad: "Sponsored Content", 
            sub: "Select a title to view details and start downloading.", share: "Share Link", copied: "COPIED! ✅" 
        },
        es: { 
            title: 'La Edad de Oro <br><span class="text-blue-500">En Tu Bolsillo.</span>',
            search: "Buscar títulos...", all: "Todas las plataformas", support: "🚀 APOYA EL VAULT (GRATIS)", 
            download: "Descargar Archivo", close: "Volver al Vault", ad: "Contenido Patrocinado", 
            sub: "Selecciona un título para ver detalles y descargar.", share: "Compartir enlace", copied: "¡COPIADO! ✅" 
        },
        ar: { 
            title: 'العصر الذهبي <br><span class="text-blue-500">في جيبك.</span>',
            search: "البحث في القائمة...", all: "جميع الأجهزة", support: "🚀 ادعم الموقع (مجاناً)", 
            download: "تحميل الملف", close: "رجوع للقائمة", ad: "محتوى إعلاني", 
            sub: "اختر لعبة لعرض التفاصيل وبدء التحميل", share: "مشاركة الرابط", copied: "تم النسخ! ✅" 
        }
    };

    function changeLanguage() {
        const langSelect = document.getElementById('langSelect');
        if (!langSelect) return;
        const lang = langSelect.value;
        const dict = i18n[lang];
        
        const elMap = {
            'mainTitle': 'innerHTML', 'subHeader': 'innerText', 'searchInput': 'placeholder', 
            'mainAdBtn': 'innerText', 'overlayDl': 'innerText', 'shareText': 'innerText',
            'closeBtn': 'innerText', 'adLabel': 'innerText'
        };

        for (let id in elMap) {
            const el = document.getElementById(id);
            if (el) el[elMap[id]] = dict[id === 'mainTitle' ? 'title' : id === 'searchInput' ? 'search' : id === 'mainAdBtn' ? 'support' : id === 'overlayDl' ? 'download' : id === 'closeBtn' ? 'close' : id === 'adLabel' ? 'ad' : id === 'shareText' ? 'share' : id === 'subHeader' ? 'sub' : ''];
        }
        
        const filter = document.getElementById('typeFilter');
        if (filter) filter.options[0].text = dict.all;
        document.body.dir = lang === 'ar' ? 'rtl' : 'ltr';

        // Update description if overlay is open
        if (currentOpenGame) {
            const game = allGames.find(g => g.title === currentOpenGame);
            if (game) {
                document.getElementById('overlayDesc').innerText = game.desc || "";
            }
        }
    }

    async function loadVault() {
        try {
            const res = await fetch('./vault-data.json?t=' + Date.now());
            if (!res.ok) throw new Error("JSON not found");
            allGames = await res.json();
            renderGrid(allGames);
            changeLanguage(); 
            checkDeepLink();
        } catch (e) { 
            console.error("Load Error:", e);
            document.getElementById('vaultGrid').innerHTML = `<p class="text-red-500">Failed to load games. Check vault-data.json</p>`;
        }
    }

    function checkDeepLink() {
        const urlParams = new URLSearchParams(window.location.search);
        const gameTitle = urlParams.get('game');
        if (gameTitle) {
            const game = allGames.find(g => g.title === gameTitle);
            if (game) openOverlay(game.title, game.cover, game.size, game.tag, game.desc, (game.url || game.driveId || ""));
        }
    }

    function renderGrid(games) {
        const grid = document.getElementById('vaultGrid');
        if (!grid) return;
        grid.innerHTML = games.length === 0 ? `<p class="text-slate-500 col-span-full text-center py-10">No games found.</p>` :
            games.map(game => `
            <div class="group glass-card rounded-[2rem] overflow-hidden cursor-pointer hover:border-blue-500/50 hover:-translate-y-2" 
                 onclick="openOverlay('${game.title.replace(/'/g, "\\'")}', '${game.cover}', '${game.size}', '${game.tag}', '${(game.desc || "").replace(/'/g, "\\'")}', '${game.url || game.driveId || ""}')">
                <div class="relative h-48 overflow-hidden">
                    <img src="${game.cover || 'https://via.placeholder.com/460x215'}" class="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-all duration-500 group-hover:scale-110">
                    <div class="absolute inset-0 bg-gradient-to-t from-[#020617] via-transparent to-transparent"></div>
                </div>
                <div class="p-6">
                    <h3 class="text-xl font-bold text-white group-hover:text-blue-400">${game.title}</h3>
                    <p class="text-slate-500 text-[10px] font-bold mt-1 uppercase tracking-widest">${game.tag} • ${game.size}</p>
                </div>
            </div>`).join('');
    }

    function searchVault() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const filter = document.getElementById('typeFilter').value;
        const filtered = allGames.filter(g => (filter === 'all' || g.type === filter) && g.title.toLowerCase().includes(query));
        renderGrid(filtered);
    }

    function openOverlay(title, img, size, tag, desc, link) {
        currentOpenGame = title;
        document.getElementById('overlayTitle').innerText = title;
        document.getElementById('overlayImg').src = img;
        document.getElementById('overlaySize').innerText = size;
        document.getElementById('overlayTag').innerText = tag;
        document.getElementById('overlayDesc').innerText = desc || "";
        document.getElementById('overlayDl').href = link.startsWith('http') ? link : `https://drive.google.com/uc?export=download&id=${link}`;
        
        const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + '?game=' + encodeURIComponent(title);
        window.history.pushState({path:newUrl}, '', newUrl);

        document.getElementById('gameOverlay').classList.replace('hidden', 'flex');
        setTimeout(() => document.getElementById('modalBox').classList.add('modal-active'), 10);
    }

    function closeOverlay() {
        currentOpenGame = null;
        document.getElementById('modalBox').classList.remove('modal-active');
        const cleanUrl = window.location.protocol + "//" + window.location.host + window.location.pathname;
        window.history.pushState({path:cleanUrl}, '', cleanUrl);
        setTimeout(() => document.getElementById('gameOverlay').classList.replace('flex', 'hidden'), 300);
    }

    function copyGameLink() {
        const currentUrl = window.location.href;
        const shareBtn = document.getElementById('shareBtn');
        const shareText = document.getElementById('shareText');
        const lang = document.getElementById('langSelect').value;

        navigator.clipboard.writeText(currentUrl).then(() => {
            shareText.innerText = i18n[lang].copied;
            shareBtn.classList.add('bg-blue-500/20', 'border-blue-500/50');
            setTimeout(() => {
                shareText.innerText = i18n[lang].share;
                shareBtn.classList.remove('bg-blue-500/20', 'border-blue-500/50');
            }, 2000);
        });
    }

    loadVault();
</script>
</body>
</html>

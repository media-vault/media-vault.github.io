<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediaVault | Private Repository</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; transition: direction 0.3s ease; }
        .glass-card { background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(59, 130, 246, 0.05); transition: 0.3s; }
        .bg-grid { background-image: radial-gradient(circle at 2px 2px, rgba(59, 130, 246, 0.03) 1px, transparent 0); background-size: 40px 40px; }
        .modal-active { transform: scale(1) !important; opacity: 1 !important; }
        .new-badge { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        body[dir="rtl"] .text-left { text-align: right; }
        body[dir="rtl"] #searchInput { text-align: right; }
    </style>
</head>
<body class="bg-grid text-slate-200 min-h-screen pb-20">

<nav class="border-b border-white/5 bg-slate-950/50 sticky top-0 z-50 backdrop-blur-md px-6 py-4 flex justify-between items-center">
    <h1 class="text-2xl font-bold text-white">Media<span class="text-blue-500">Vault</span></h1>
    <div class="flex items-center gap-4">
        <select id="langSelect" onchange="changeLanguage()" class="bg-white/5 text-slate-300 text-[10px] font-bold px-2 py-1 rounded border border-white/10 outline-none cursor-pointer">
            <option value="en">EN</option>
            <option value="es">ES</option>
            <option value="ar">AR</option>
        </select>
        <button onclick="requestGame()" id="reqMainBtn" class="bg-blue-600/10 hover:bg-blue-600/20 text-blue-400 text-[10px] font-bold px-3 py-1 rounded border border-blue-500/20 transition-all uppercase tracking-tighter">Request Game</button>
    </div>
</nav>

<header class="max-w-7xl mx-auto px-6 pt-16 pb-12 text-center">
    <h2 id="mainTitle" class="text-5xl font-extrabold text-white mb-6">The Golden Age <br><span class="text-blue-500">In Your Pocket.</span></h2>
    <p id="subHeader" class="text-slate-400 text-lg mb-10">Select a title to view details and start downloading.</p>
    <a id="mainAdBtn" href="https://www.effectivegatecpm.com/nu5nxhvxu?key=3c2836e0c24cca58b18b7f39e72f03c6" target="_blank" class="px-8 py-4 bg-blue-600 hover:bg-blue-500 text-white font-black rounded-2xl transition-all shadow-xl shadow-blue-600/30">🚀 SUPPORT THE VAULT (FREE)</a>
</header>

<div class="max-w-7xl mx-auto px-6 mb-12">
    <div class="flex flex-col md:flex-row gap-4 justify-between items-center bg-slate-900/40 p-2 rounded-2xl border border-white/5">
        <input type="text" id="searchInput" onkeyup="searchVault()" placeholder="Search vault titles..." class="bg-transparent w-full px-6 py-3 outline-none text-white font-medium">
        <select id="typeFilter" onchange="searchVault()" class="bg-slate-800 text-white px-6 py-3 rounded-xl font-bold text-sm border border-white/10">
            <option value="all">All Platforms</option>
            <option value="pc">PC Games</option>
            <option value="quest">Meta Quest</option>
            <option value="psp">PSP</option>
            <option value="ps1">PS1</option>
        </select>
    </div>
</div>

<main id="vaultGrid" class="max-w-7xl mx-auto px-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></main>

<div id="gameOverlay" class="fixed inset-0 z-[100] hidden items-center justify-center p-4">
    <div class="absolute inset-0 bg-black/80 backdrop-blur-xl" onclick="closeOverlay()"></div>
    <div id="modalBox" class="relative w-full max-w-lg bg-[#0d1117] border border-white/10 rounded-[2.5rem] overflow-hidden shadow-2xl scale-90 opacity-0 transition-all duration-300">
        <img id="overlayImg" src="" class="w-full h-56 object-cover">
        <div class="p-8">
            <h2 id="overlayTitle" class="text-3xl font-black italic uppercase text-white mb-2"></h2>
            <div class="flex gap-2 mb-4">
                <span id="overlaySize" class="bg-blue-600/20 text-blue-400 text-[10px] font-bold px-3 py-1 rounded-full border border-blue-500/30"></span>
                <span id="overlayTag" class="bg-white/5 text-gray-400 text-[10px] px-3 py-1 rounded-full border border-white/10"></span>
            </div>
            <p id="overlayDesc" class="text-slate-400 text-sm mb-8 leading-relaxed"></p>
            <div class="flex flex-col gap-3">
                <a id="overlayDl" href="#" target="_blank" class="w-full py-4 bg-blue-600 hover:bg-blue-500 text-white text-center font-black uppercase rounded-2xl shadow-lg">Download File</a>
                <div class="grid grid-cols-2 gap-3">
                    <button id="shareBtn" onclick="copyGameLink()" class="py-3 bg-white/5 hover:bg-white/10 text-white text-center font-bold uppercase rounded-xl border border-white/10 transition-all"><span id="shareText">Share</span></button>
                    <button id="reportBtn" onclick="reportLink()" class="py-3 bg-red-500/10 hover:bg-red-500/20 text-red-400 text-center font-bold uppercase rounded-xl border border-red-500/20 transition-all"><span id="reportText">Report</span></button>
                </div>
                <button id="closeBtn" onclick="closeOverlay()" class="text-slate-500 hover:text-white text-xs font-bold uppercase tracking-widest mt-2">Back to Vault</button>
            </div>
        </div>
    </div>
</div>

<script>
    // --- WEBHOOK CONFIGURATION ---
    const WEBHOOK_REPORTS = "https://discord.com/api/webhooks/1480201609618391112/zXvraiW-sH1F9ksTE3fbprA91nvLi5R-2wZQRj0hJVqHXlekQHg5ZyjfAKbsPPDSSYtI";
    const WEBHOOK_REQUESTS = "https://discord.com/api/webhooks/1480205130560176220/dsoePE0ouSFmduLF6XWiYQKTny_HNa81Hw1Mz9ho2BhG7VsSfS9jbWruypxpaezHgaEg";

    let allGames = [];
    let currentOpenGame = null;
    
    const i18n = {
        en: { title: 'The Golden Age <br><span class="text-blue-500">In Your Pocket.</span>', search: "Search vault titles...", all: "All Platforms", support: "🚀 SUPPORT THE VAULT (FREE)", download: "Download File", close: "Back to Vault", ad: "Sponsored Content", sub: "Select a title to view details and start downloading.", share: "Share", copied: "COPIED! ✅", report: "Report", sent: "Reported! 🚨", req: "Request Game", reqSent: "Requested! ✅", prompt: "Enter the name of the game you want:" },
        es: { title: 'La Edad de Oro <br><span class="text-blue-500">En Tu Bolsillo.</span>', search: "Buscar títulos...", all: "Todas las plataformas", support: "🚀 APOYA EL VAULT (GRATIS)", download: "Descargar Archivo", close: "Volver al Vault", ad: "Contenido Patrocinado", sub: "Selecciona un título para ver detalles y descargar.", share: "Compartir", copied: "¡COPIADO! ✅", report: "Reportar", sent: "¡Enviado! 🚨", req: "Pedir Juego", reqSent: "¡Pedido! ✅", prompt: "Ingresa el nombre del juego que deseas:" },
        ar: { title: 'العصر الذهبي <br><span class="text-blue-500">في جيبك.</span>', search: "البحث في القائمة...", all: "جميع الأجهزة", support: "🚀 ادعم الموقع (مجاناً)", download: "تحميل الملف", close: "رجوع للقائمة", ad: "محتوى إعلاني", sub: "اختر لعبة لعرض التفاصيل وبدء التحميل", share: "مشاركة", copied: "تم النسخ! ✅", report: "إبلاغ", sent: "تم الإبلاغ! 🚨", req: "طلب لعبة", reqSent: "تم الطلب! ✅", prompt: "أدخل اسم اللعبة التي تريدها:" }
    };

    function changeLanguage() {
        const lang = document.getElementById('langSelect').value;
        const dict = i18n[lang];
        const elMap = { 'mainTitle':'innerHTML', 'subHeader':'innerText', 'searchInput':'placeholder', 'mainAdBtn':'innerText', 'overlayDl':'innerText', 'shareText':'innerText', 'reportText':'innerText', 'closeBtn':'innerText', 'reqMainBtn':'innerText' };
        for (let id in elMap) { if(document.getElementById(id)) document.getElementById(id)[elMap[id]] = dict[id==='mainTitle'?'title':id==='searchInput'?'search':id==='mainAdBtn'?'support':id==='overlayDl'?'download':id==='closeBtn'?'close':id==='shareText'?'share':id==='reportText'?'report':id==='reqMainBtn'?'req':'sub']; }
        document.getElementById('typeFilter').options[0].text = dict.all;
        document.body.dir = lang === 'ar' ? 'rtl' : 'ltr';
        if (currentOpenGame) { const g = allGames.find(x => x.title === currentOpenGame); if(g) document.getElementById('overlayDesc').innerText = g.desc || ""; }
    }

    async function loadVault() {
        try {
            const res = await fetch('./vault-data.json?t=' + Date.now());
            allGames = await res.json();
            renderGrid(allGames);
            changeLanguage(); 
            checkDeepLink();
        } catch (e) { console.error(e); }
    }

    function renderGrid(games) {
        const grid = document.getElementById('vaultGrid');
        if (!grid) return;
        const now = new Date();
        grid.innerHTML = games.map(game => {
            const isNew = game.date && (now - new Date(game.date)) / (1000 * 60 * 60 * 24) < 3;
            return `
            <div class="group glass-card rounded-[2rem] overflow-hidden cursor-pointer hover:border-blue-500/50 hover:-translate-y-2 relative" 
                 onclick="openOverlay('${game.title.replace(/'/g, "\\'")}', '${game.cover}', '${game.size}', '${game.tag}', '${(game.desc || "").replace(/'/g, "\\'")}', '${game.url || game.driveId || ""}')">
                ${isNew ? '<span class="absolute top-4 right-4 z-10 bg-blue-500 text-white text-[9px] font-black px-2 py-1 rounded-lg new-badge shadow-lg shadow-blue-500/50">NEW</span>' : ''}
                <div class="relative h-48 overflow-hidden">
                    <img src="${game.cover || 'https://via.placeholder.com/460x215'}" class="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-all duration-500 group-hover:scale-110">
                    <div class="absolute inset-0 bg-gradient-to-t from-[#020617] via-transparent to-transparent"></div>
                </div>
                <div class="p-6">
                    <h3 class="text-xl font-bold text-white group-hover:text-blue-400">${game.title}</h3>
                    <p class="text-slate-500 text-[10px] font-bold mt-1 uppercase tracking-widest">${game.tag} • ${game.size}</p>
                </div>
            </div>`;
        }).join('');
    }

    function searchVault() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        const f = document.getElementById('typeFilter').value;
        renderGrid(allGames.filter(g => (f === 'all' || g.type === f) && g.title.toLowerCase().includes(q)));
    }

    function openOverlay(title, img, size, tag, desc, link) {
        currentOpenGame = title;
        document.getElementById('overlayTitle').innerText = title;
        document.getElementById('overlayImg').src = img;
        document.getElementById('overlaySize').innerText = size;
        document.getElementById('overlayTag').innerText = tag;
        document.getElementById('overlayDesc').innerText = desc || "";
        document.getElementById('overlayDl').href = link.startsWith('http') ? link : `https://drive.google.com/uc?export=download&id=${link}`;
        const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + '?game=' + encodeURIComponent(title);
        window.history.pushState({path:newUrl}, '', newUrl);
        document.getElementById('gameOverlay').classList.replace('hidden', 'flex');
        setTimeout(() => document.getElementById('modalBox').classList.add('modal-active'), 10);
    }

    function closeOverlay() {
        currentOpenGame = null;
        document.getElementById('modalBox').classList.remove('modal-active');
        const cleanUrl = window.location.protocol + "//" + window.location.host + window.location.pathname;
        window.history.pushState({path:cleanUrl}, '', cleanUrl);
        setTimeout(() => document.getElementById('gameOverlay').classList.replace('flex', 'hidden'), 300);
    }

    function copyGameLink() {
        const lang = document.getElementById('langSelect').value;
        navigator.clipboard.writeText(window.location.href).then(() => {
            document.getElementById('shareText').innerText = i18n[lang].copied;
            setTimeout(() => { document.getElementById('shareText').innerText = i18n[lang].share; }, 2000);
        });
    }

    async function reportLink() {
        if (!WEBHOOK_REPORTS.startsWith('http')) return alert("Reports Webhook not configured.");
        const lang = document.getElementById('langSelect').value;
        const res = await fetch(WEBHOOK_REPORTS, { 
            method: 'POST', 
            headers: { 'Content-Type': 'application/json' }, 
            body: JSON.stringify({ 
                content: "🚨 **BROKEN LINK REPORTED**", 
                embeds: [{ 
                    title: currentOpenGame, 
                    color: 15548997, 
                    description: "This game link is down.",
                    fields: [{ name: "Direct URL", value: window.location.href }] 
                }] 
            }) 
        });
        if(res.ok) { 
            document.getElementById('reportText').innerText = i18n[lang].sent; 
            document.getElementById('reportBtn').disabled = true; 
        }
    }

    async function requestGame() {
        const lang = document.getElementById('langSelect').value;
        const game = prompt(i18n[lang].prompt);
        if (!game || !WEBHOOK_REQUESTS.startsWith('http')) return;
        
        const res = await fetch(WEBHOOK_REQUESTS, { 
            method: 'POST', 
            headers: { 'Content-Type': 'application/json' }, 
            body: JSON.stringify({ 
                content: `📫 **NEW GAME REQUEST**`,
                embeds: [{
                    description: `User requested: **${game}**`,
                    color: 3447003
                }]
            }) 
        });
        if(res.ok) alert(i18n[lang].reqSent);
    }

    function checkDeepLink() {
        const g = new URLSearchParams(window.location.search).get('game');
        if (g) { const game = allGames.find(x => x.title === g); if (game) openOverlay(game.title, game.cover, game.size, game.tag, game.desc, (game.url || game.driveId || "")); }
    }

    loadVault();
</script>
</body>
</html>
